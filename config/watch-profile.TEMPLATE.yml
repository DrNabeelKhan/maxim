# Maxim Proactive Watch — Per-Project Configuration Template
#
# Copy this file to config/watch-profile.yml in your project.
# Unset fields inherit these template defaults.
# Ratified by ADR-002 (Documents as Executable Contracts).
#
# Schema: .claude/skills/proactive-watch/schemas/watch-profile.schema.json

enabled: true
phase: light                        # light | full (v1.0.0+) | critical (v1.0.0+)

checkers:
  inventory-drift:
    enabled: true
    source_of_truth: documents/ledgers/AGENT_SKILL_INVENTORY.md
    reality_paths:
      - agents/MXM/**
      - .claude/skills/**
      - .claude/commands/**

  version-drift:
    enabled: true
    anchor: config/agent-registry.json
    must_match:
      - README.md
      - documents/guides/HELP.md
      - documents/guides/ABOUT.md
      - CLAUDE.md
      - package.json
    version_regex: 'v?\d+\.\d+\.\d+'

  contract-drift:                   # 🔒 triage LOCKED to CEO
    enabled: true
    adr_dir: documents/ADRs/
    inventory_file: documents/ledgers/AGENT_SKILL_INVENTORY.md

  cross-doc-drift:
    enabled: true
    canonical_docs:
      - CHANGELOG.md
    mirror_docs:
      - README.md
      - documents/guides/HELP.md
      - documents/guides/ABOUT.md

  orphan-refs:
    enabled: true
    check_commands: .claude/commands/
    check_hooks: .claude/hooks/
    check_mcp: .mcp.json

  dependency-drift:
    enabled: true
    npm_paths:
      - mcp/*/package.json
    exclude:
      - community-packs/**
      - node_modules/**

  git-hygiene:
    enabled: true
    stale_uncommitted_hours: 24
    stale_unpushed_hours: 72

  junction-drift:
    enabled: true                   # Windows-only in practice
    expected_junctions:
      - .mxm-system
      - .claude

  stale-handoff:
    enabled: true
    handoff_path: .claude-sessions-memory/handoff.md
    max_age_days: 7

  compliance-drift:                 # 🔒 triage LOCKED to CSO
    enabled: true
    # delegates to mxm-compliance MCP when available
    # in LIGHT phase, scans tracked files for high-signal secret patterns only

  surface-claims-drift:             # added v1.0.1 — class 11
    enabled: true
    source_of_truth: documents/ledgers/AGENT_SKILL_INVENTORY.md
    surface_paths:
      - "*.md"
      - "documents/**/*.md"
      - ".claude/**/*.md"
      - "templates/**/*.md"
      - "distributions/**/*.md"
      - "packaging/**/*.md"
      - "composable-skills/**/*.md"
      - "config/agent-registry.json"
    excluded_paths:
      - "CHANGELOG.md"                     # historical version entries are point-in-time accurate
      - "documents/ADRs/INDEX.md"          # historical superseded ADRs
      - "**/v[0-9]*-*.md"                  # versioned historical docs (e.g., maxim-pack-catalog-v1.0.0.md)
      - "**/changelog/**"                   # any changelog directory
      - "**/migration-log*"                 # operational ledgers preserve historical state
    # cross_repo_targets:                  # uncomment + configure if a sibling marketing/landing repo exists
    #   - path: "../landing-page"          # resolved relative to repo root
    #     env_override: MAXIM_LANDING_PAGE
    #     file_globs:
    #       - "**/*.tsx"
    #       - "**/*.ts"
    #     excluded:
    #       - "app/changelog/**"
    #       - "app/roadmap/**"
    anchors:
      - keyword: "agents"
        section: "Section 1 — Specialist Agents"
      - keyword: "skill domains"
        section: "Section 2 — Domain Skills"
      - keyword: "commands"
        section: "Section 3 — Slash Commands"
      - keyword: "MCP servers"
        section: "Section 4 — MCP Servers"
      - keyword: "MCP tools"
        section: "Section 4 — MCP Servers"
      - keyword: "hooks"
        section: "Section 5 — Hooks"
      - keyword: "frameworks"
        section: "Section 6 — Behavioral Frameworks"
      - keyword: "compliance frameworks"
        section: "Section 7 — Compliance Frameworks"

triage:
  inventory-drift: coo
  version-drift: coo
  contract-drift: ceo               # 🔒 LOCKED — cannot override
  cross-doc-drift: coo
  orphan-refs: cto
  dependency-drift: cto
  git-hygiene: cto
  junction-drift: cto
  stale-handoff: coo
  compliance-drift: cso             # 🔒 LOCKED — cannot override
  surface-claims-drift: coo         # added v1.0.1

thresholds:
  max_drift_severity: 5             # not enforced in LIGHT (warn-only)
  fail_on_error: hybrid             # hybrid | fail-open | fail-closed

