# maxim — Proactive Watch Configuration
#
# This file = the maxim repo's own watch profile.
# The framework's first consumer is itself (self-adoption).
#
# Any deviation from template defaults is commented below.

enabled: true
phase: light

checkers:
  inventory-drift:
    enabled: true
    # maxim uses the standard documents/ledgers/AGENT_SKILL_INVENTORY.md contract

  version-drift:
    enabled: true
    # maxim needs README, HELP, ABOUT, CLAUDE.md, and package.json files to match registry

  contract-drift:
    enabled: true
    # maxim has 2 seeded ADRs (001, 002) — scope-lockdown pattern not yet active

  cross-doc-drift:
    enabled: true

  orphan-refs:
    enabled: true

  dependency-drift:
    enabled: true
    # maxim has MCP servers under mcp/ — each with its own package.json

  git-hygiene:
    enabled: true

  junction-drift:
    enabled: true
    # Windows-first dev environment (NK on Windows 11)

  stale-handoff:
    enabled: true
    # 7-day default; maxim is actively maintained

  compliance-drift:
    enabled: true
    # 🔒 CSO-locked; delegates to mxm-compliance MCP

  surface-claims-drift:
    enabled: true
    # Added v1.0.1 (2026-04-27). Catches inventory-vs-marketing-copy drift
    # (e.g., INVENTORY says 90 agents, README/landing-page say 88). Companion
    # tool bootstrap/sync-counts.{sh,ps1} propagates inventory counts to all
    # declared surfaces mechanically.
    source_of_truth: documents/ledgers/AGENT_SKILL_INVENTORY.md
    surface_paths:
      - "*.md"
      - "documents/**/*.md"
      - ".claude/**/*.md"
      - "templates/**/*.md"
      - "distributions/**/*.md"
      - "packaging/**/*.md"
      - "composable-skills/**/*.md"
      - "config/agent-registry.json"
    excluded_paths:
      - "CHANGELOG.md"                     # historical version entries are point-in-time accurate
      - "documents/ADRs/INDEX.md"          # historical superseded ADRs
      - "documents/ledgers/DEBUGGING_PLAYBOOK.md"  # append-only journal; historical examples preserved
      - "**/v[0-9]*-*.md"                  # versioned historical docs (e.g., maxim-pack-catalog-v1.0.0.md)
      - "**/changelog/**"                   # any changelog directory
      - "**/migration-log*"                 # operational ledgers preserve historical state
    cross_repo_targets:
      - path: "../landing-page"            # resolved relative to repo root; honors MAXIM_LANDING_PAGE env override
        env_override: MAXIM_LANDING_PAGE
        file_globs:
          - "**/*.tsx"
          - "**/*.ts"
        excluded:
          - "app/changelog/page.tsx"        # historical release entries
          - "app/roadmap/page.tsx"          # historical timeline entries
          - "app/giveaway/**"                # currency values $X.88 false-match risk
          - "components/DispatchDiagram.tsx" # SVG coordinates
    anchors:
      - keyword: "agents"
        section: "Section 1 — Specialist Agents"
      - keyword: "skill domains"
        section: "Section 2 — Domain Skills"
      - keyword: "commands"
        section: "Section 3 — Slash Commands"
      - keyword: "MCP servers"
        section: "Section 4 — MCP Servers"
      - keyword: "MCP tools"
        section: "Section 4 — MCP Servers"
      - keyword: "hooks"
        section: "Section 5 — Hooks"
      - keyword: "frameworks"
        section: "Section 6 — Behavioral Frameworks"
      - keyword: "compliance frameworks"
        section: "Section 7 — Compliance Frameworks"

triage:
  inventory-drift: coo
  version-drift: coo
  contract-drift: ceo               # 🔒 LOCKED
  cross-doc-drift: coo
  orphan-refs: cto
  dependency-drift: cto
  git-hygiene: cto
  junction-drift: cto
  stale-handoff: coo
  compliance-drift: cso             # 🔒 LOCKED
  surface-claims-drift: coo         # added v1.0.1

thresholds:
  max_drift_severity: 5
  fail_on_error: hybrid
