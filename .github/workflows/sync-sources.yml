name: Sync Community Packs

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read community pack registry
        id: registry
        run: |
          jq -c '.packs[]' config/community-pack-registry.json > /tmp/packs.jsonl
          echo "count=$(wc -l < /tmp/packs.jsonl)" >> $GITHUB_OUTPUT

      - name: Sync each pack
        run: |
          while IFS= read -r pack; do
            id=$(echo "$pack" | jq -r .id)
            source=$(echo "$pack" | jq -r .source)
            branch=$(echo "$pack" | jq -r .branch)
            install_path=$(echo "$pack" | jq -r .install_path)
            echo "::group::Syncing $id from $source@$branch"
            rm -rf "/tmp/sync-$id"
            git clone --depth 1 --branch "$branch" "https://github.com/${source}.git" "/tmp/sync-$id" || { echo "::warning::clone failed for $id"; continue; }
            mkdir -p "$install_path"
            rsync -a --delete --exclude='.git' "/tmp/sync-$id/" "$install_path"
            echo "::endgroup::"
          done < /tmp/packs.jsonl

      - name: Maxim Guard boundary check
        run: |
          test -d community-packs || { echo "no community-packs/"; exit 0; }

      - name: Commit if changed
        run: |
          git config user.name "mxm-sync-bot"
          git config user.email "sync-bot@maxim.local"
          git add community-packs/ || true
          git pull --rebase origin main
          git diff --cached --quiet || git commit -m "chore(sync): monthly community pack sync ($(date -u +%Y-%m-%d))"
          git push origin main
